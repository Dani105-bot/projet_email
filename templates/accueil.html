<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Revival Technologies & Conseils</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1F4E79, #2E75B6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carte {
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #1F4E79;
            margin-bottom: 5px;
        }
        .logo span { color: #2E75B6; }
        .sous-titre {
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .badge-app {
            background: #EBF3FB;
            color: #1F4E79;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 30px;
            display: inline-block;
        }
        .separateur {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
        label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: bold;
            color: #444;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: #2E75B6; }
        button {
            width: 100%;
            padding: 13px;
            background: #1F4E79;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover { background: #2E75B6; }
        .erreur {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="carte">
        <div class="logo">Revival Technologies et Conseils</div>
        <span class="badge-app">📧 Gestionnaire d'Emails IA</span>
        <hr class="separateur">

        {% if erreur %}
        <div class="erreur">{{ erreur }}</div>
        {% endif %}

        <form method="POST">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Entrez votre identifiant" required>
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="Entrez votre mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
    </div>
</body>
</html>
